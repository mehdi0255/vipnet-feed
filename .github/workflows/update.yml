name: Update VIPNet Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect public configurations
        run: python collector.py

      - name: Save updated feed
        run: |
          git config user.name "vipnet-feed-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/configs.json
          git diff --cached --quiet || (git commit -m "Update VIPNet feed" 
